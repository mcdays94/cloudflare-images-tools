<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Concept 3 — "Gallery Grid"
    Four photo-card tiles in a 2×2 grid, each with a tiny horizon
    illustration. Conveys "manage a library of images" — fits well with
    My Cloudflare Images being a top-line command. Cream background;
    warm coral tiles.
  -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF5E1"/>
      <stop offset="1" stop-color="#F7E3C0"/>
    </linearGradient>
    <linearGradient id="tile3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8C5A"/>
      <stop offset="1" stop-color="#E26A38"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg3)"/>

  <!-- 2x2 grid of tiles -->
  <g>
    <!-- top-left: photo of mountain + sun -->
    <g transform="translate(96 96)">
      <rect width="160" height="160" rx="20" fill="url(#tile3)"/>
      <path d="M 22 132 L 64 76 L 96 110 L 118 90 L 138 132 Z" fill="#FCE9CB"/>
      <circle cx="116" cy="48" r="14" fill="#FCE9CB"/>
    </g>

    <!-- top-right: cloud -->
    <g transform="translate(256 96)">
      <rect width="160" height="160" rx="20" fill="url(#tile3)"/>
      <g fill="#FCE9CB">
        <circle cx="50" cy="100" r="22"/>
        <circle cx="78" cy="84" r="30"/>
        <circle cx="110" cy="90" r="26"/>
        <rect x="46" y="100" width="78" height="28" rx="14"/>
      </g>
    </g>

    <!-- bottom-left: solid horizon photo -->
    <g transform="translate(96 256)">
      <rect width="160" height="160" rx="20" fill="url(#tile3)"/>
      <rect x="20" y="100" width="120" height="48" rx="6" fill="#FCE9CB"/>
      <circle cx="50" cy="70" r="14" fill="#FCE9CB"/>
    </g>

    <!-- bottom-right: upload arrow -->
    <g transform="translate(256 256)">
      <rect width="160" height="160" rx="20" fill="url(#tile3)"/>
      <g fill="#FCE9CB">
        <rect x="68" y="62" width="24" height="68" rx="8"/>
        <path d="M 50 70 L 80 38 L 110 70 Z"/>
      </g>
    </g>
  </g>
</svg>
