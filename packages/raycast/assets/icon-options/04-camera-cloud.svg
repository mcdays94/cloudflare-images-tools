<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Concept 4 — "Camera + Cloud"
    A camera silhouette with a cloud where the lens aperture would be.
    Strong photography metaphor + cloud storage in one shape. Slate
    background reads "professional / power-tool"; warm coral camera body
    with cream cloud aperture.
  -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A4666"/>
      <stop offset="1" stop-color="#21283E"/>
    </linearGradient>
    <linearGradient id="body4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8C5A"/>
      <stop offset="1" stop-color="#E26A38"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg4)"/>

  <!-- camera body -->
  <g>
    <!-- top viewfinder hump -->
    <path d="M 168 124 L 168 156 L 218 156 L 232 138 L 280 138 L 294 156 L 344 156 L 344 124 Z" fill="url(#body4)"/>
    <!-- main body -->
    <rect x="104" y="156" width="304" height="216" rx="28" fill="url(#body4)"/>
    <!-- lens housing (large circle) -->
    <circle cx="256" cy="270" r="92" fill="#1A2238"/>
    <circle cx="256" cy="270" r="80" fill="#2A3354"/>
    <!-- cloud where aperture would be -->
    <g fill="#FCE9CB" transform="translate(256 270)">
      <circle cx="-30" cy="4" r="20"/>
      <circle cx="-4" cy="-12" r="28"/>
      <circle cx="26" cy="-4" r="24"/>
      <circle cx="38" cy="14" r="18"/>
      <rect x="-32" y="4" width="80" height="22" rx="11"/>
    </g>
    <!-- shutter button -->
    <circle cx="356" cy="142" r="14" fill="#FCE9CB"/>
  </g>
</svg>
