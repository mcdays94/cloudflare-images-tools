<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Concept 1 — "Stack & Cloud"
    Two stacked photo cards with a soft cloud floating above. Communicates
    "upload images to a cloud library". Warm peach background; cream
    foreground; deep terracotta accents to differentiate from official
    Cloudflare orange.
  -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9B6A"/>
      <stop offset="1" stop-color="#F37551"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF5E1"/>
      <stop offset="1" stop-color="#FCE9CB"/>
    </linearGradient>
  </defs>

  <!-- rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg1)"/>

  <!-- soft cloud, floating up-left -->
  <g fill="#FFF5E1" opacity="0.92">
    <circle cx="158" cy="148" r="46"/>
    <circle cx="208" cy="128" r="56"/>
    <circle cx="266" cy="142" r="50"/>
    <circle cx="316" cy="156" r="42"/>
    <rect x="142" y="148" width="200" height="48" rx="24"/>
  </g>

  <!-- back photo card -->
  <g transform="translate(112 234) rotate(-7)">
    <rect width="288" height="208" rx="22" fill="url(#card1)" stroke="#C25C3B" stroke-width="3"/>
    <!-- mountain horizon -->
    <path d="M 30 168 L 96 96 L 156 140 L 198 110 L 258 168 Z" fill="#C25C3B"/>
    <!-- sun -->
    <circle cx="226" cy="60" r="22" fill="#FF7A4A"/>
  </g>

  <!-- front photo card (tilted other way, slightly on top) -->
  <g transform="translate(146 286) rotate(6)">
    <rect width="288" height="208" rx="22" fill="url(#card1)" stroke="#A04428" stroke-width="3"/>
    <path d="M 30 168 L 96 96 L 156 140 L 198 110 L 258 168 Z" fill="#A04428"/>
    <circle cx="226" cy="60" r="22" fill="#FF7A4A"/>
  </g>
</svg>
